name: TBG Pipeline Scanner

on:
  schedule:
    - cron: '0 11 * * *'   # 07:00 ET daily (UTC-4)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit pipeline.json back to repo

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline scanner
        env:
          GOVTRIBE_BEARER_TOKEN: ${{ secrets.GOVTRIBE_BEARER_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scanner.py

      - name: Commit updated pipeline.json
        run: |
          git config user.name  "TBG Scanner Bot"
          git config user.email "scanner@tbg.local"
          git add pipeline.json
          git diff --staged --quiet || git commit -m "chore: pipeline scan $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
